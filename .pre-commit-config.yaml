repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.2.0
    hooks:
    -   id: check-yaml
    -   id: end-of-file-fixer
        exclude: ^tests/.*\.tsv$
    -   id: trailing-whitespace
        exclude: ^tests/.*\.tsv$
-   repo: local
    hooks:
    -   id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
    -   id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        types: [python]
